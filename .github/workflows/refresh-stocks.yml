name: Refresh stock watchlist

# Weekday snapshots around both closes: 21:30 UTC is after the US close, and
# 06:00 UTC is after Taiwan's. The page also refreshes live in the browser, so
# this is the always-available fallback rather than the only source of truth.
on:
  schedule:
    - cron: "30 21 * * 1-5"
    - cron: "0 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch quotes
        run: python scripts/refresh_stocks.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stocks/data/quotes.json
          git diff --staged --quiet || git commit -m "Refresh stock watchlist snapshot"
          git push
