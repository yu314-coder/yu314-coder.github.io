<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Page not found — Yu, Yao-Hsing 尤耀星's portfolio.">
  <meta name="robots" content="noindex">

  <title>404 — Page Not Found | Yu, Yao-Hsing 尤耀星</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .error-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 40%, #2c5364 100%);
      color: #fff;
      padding: 40px 20px;
    }
    .error-code {
      font-size: clamp(6rem, 22vw, 12rem);
      font-weight: 700;
      line-height: 1;
      margin: 0;
      background: linear-gradient(90deg, #64b5f6, #06b6d4);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .error-hero p {
      font-size: 1.25rem;
      opacity: 0.9;
      margin: 16px 0 32px;
    }
    .error-actions a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      padding: 0 22px;
      margin: 6px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, background 0.15s;
    }
    .error-actions .primary {
      background: #fff;
      color: #14213d;
    }
    .error-actions .ghost {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .error-actions a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <section class="error-hero">
    <div>
      <h1 class="error-code">404</h1>
      <h2 class="fw-bold mb-2">Page Not Found</h2>
      <p>The page you're looking for doesn't exist or may have moved.</p>
      <div class="error-actions">
        <a href="index.html" class="primary">🏠 Go Home</a>
        <a href="projects.html" class="ghost">🚀 View Projects</a>
      </div>
    </div>
  </section>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
