<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description" content="Page not found — Yu, Yao-Hsing 尤耀星's portfolio.">
  <meta name="robots" content="noindex">

  <title>404 — Page Not Found | Yu, Yao-Hsing 尤耀星</title>

  <!-- Bootstrap 5 (UNCHANGED — keep loaded for grid + tab/collapse JS) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

  <!-- Fonts: retire Roboto entirely. Load all four families in ONE request. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

  <!-- Site stylesheet (single source of truth) -->
  <link rel="stylesheet" href="assets/css/style.css">
  <script>document.documentElement.classList.add('js');addEventListener('load',function(){setTimeout(function(){if(document.querySelector('.reveal')&&!document.querySelector('.reveal.is-visible')){document.querySelectorAll('.reveal').forEach(function(e){e.classList.add('is-visible')})}},1400)})</script>

  <style>
    /* Page-specific: full-bleed dark 404 hero (no navbar on this page) */
    .error-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-family: var(--font-head);
      font-size: clamp(6rem, 22vw, 12rem);
      font-weight: 700;
      line-height: 1;
      margin: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .error-hero p {
      font-size: 1.25rem;
      color: var(--ink-2);
      max-width: 38ch;
      margin: 16px auto 32px;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <section class="error-hero zone-dark">
    <div>
      <p class="eyebrow eyebrow--rule">// error 404</p>
      <h1 class="error-code">404</h1>
      <h2 class="fw-bold mb-2">Page not found</h2>
      <p>The page you're looking for doesn't exist or may have moved.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Go home</a>
        <a href="projects.html" class="btn btn-ghost">View projects</a>
      </div>
    </div>
  </section>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <!-- Motion + interactions -->
  <script src="assets/js/ui.js"></script>
</body>
</html>
