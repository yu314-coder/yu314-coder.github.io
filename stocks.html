<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Hidden page: reachable only by double-clicking the device chip. Keep it out
       of search results and out of the nav. Not secret in a security sense — the
       URL is public if you know it — just unlisted. -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>Watchlist</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">

  <style>
    .sx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:1rem}
    .sx-card{background:var(--bg-alt);border:1px solid var(--line);border-radius:var(--r);padding:1rem 1.15rem;position:relative;overflow:hidden}
    .sx-card::before{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--line-2)}
    .sx-card.up::before{background:rgb(52,211,153)}
    .sx-card.down::before{background:rgb(248,113,113)}
    .sx-sym{font:600 .78rem/1 JetBrains Mono,monospace;letter-spacing:.04em;color:var(--ink-3)}
    .sx-name{font:500 .82rem/1.25 Inter,sans-serif;color:var(--ink-2);margin-top:.15rem;min-height:2.1em}
    .sx-price{font:800 1.65rem/1.1 Inter,sans-serif;margin-top:.5rem;letter-spacing:-.02em}
    .sx-cur{font:600 .72rem/1 JetBrains Mono,monospace;color:var(--ink-3);margin-left:.3rem}
    .sx-chg{font:700 .9rem/1 JetBrains Mono,monospace;margin-top:.35rem}
    .sx-chg.up{color:rgb(52,211,153)} .sx-chg.down{color:rgb(248,113,113)}
    .sx-spark{margin-top:.6rem;display:block;width:100%;height:42px}
    .sx-meta{font:500 .72rem/1.4 Inter,sans-serif;color:var(--ink-3);margin-top:.55rem;display:flex;justify-content:space-between;gap:.5rem}
    .sx-sec{font:600 .72rem/1 JetBrains Mono,monospace;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin:1.9rem 0 .8rem}
    .sx-note{font:500 .8rem/1.45 Inter,sans-serif;color:var(--ink-3)}
    .sx-live{display:inline-flex;align-items:center;gap:.35rem;font:600 .7rem/1 JetBrains Mono,monospace;
      padding:.25rem .5rem;border-radius:999px;border:1px solid var(--line);color:var(--ink-2)}
    .sx-live b{width:.45rem;height:.45rem;border-radius:50%;background:var(--ink-3);display:inline-block}
    .sx-live.on b{background:rgb(52,211,153)}
    .sx-err{background:var(--bg-alt);border:1px dashed var(--line);border-radius:var(--r);padding:1.5rem;text-align:center;color:var(--ink-2)}
  </style>
</head>
<body class="theme-dark">

  <header class="page-header">
    <div class="container">
      <p class="eyebrow eyebrow--rule">unlisted &middot; watchlist</p>
      <h1>Watchlist</h1>
      <p class="lead-2 mb-0">Taiwan ETFs, TSMC, and the US names I follow. Prices are snapshotted server-side and
        refreshed live in the browser when possible. <span class="sx-live" id="sx-live"><b></b><span id="sx-live-t">loading</span></span></p>
    </div>
  </header>

  <section class="container section">
    <div id="sx-root"><div class="sx-err">Loading quotes&hellip;</div></div>
    <p class="sx-note mt-4" id="sx-updated"></p>
    <p class="sx-note">Data: Yahoo Finance, delayed. For my own tracking &mdash; not investment advice.
      <a href="index.html">&larr; back to the site</a></p>
  </section>

  <script>
  (function () {
    var DATA = "assets/stocks/data/quotes.json";
    var PROXY = "https://corsproxy.io/?url=";
    var API = "https://query1.finance.yahoo.com/v8/finance/chart/";
    var root = document.getElementById("sx-root");
    var liveEl = document.getElementById("sx-live"), liveT = document.getElementById("sx-live-t");

    function fmt(v, d) {
      if (v == null || !isFinite(v)) return "—";
      return v.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d });
    }
    function spark(vals, up) {
      if (!vals || vals.length < 2) return "";
      var w = 240, h = 42, lo = Math.min.apply(null, vals), hi = Math.max.apply(null, vals), rng = (hi - lo) || 1;
      var pts = vals.map(function (v, i) {
        return (i / (vals.length - 1) * w).toFixed(1) + "," + (h - (v - lo) / rng * (h - 4) - 2).toFixed(1);
      }).join(" ");
      var col = up ? "rgb(52,211,153)" : "rgb(248,113,113)";
      return '<svg class="sx-spark" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none" aria-hidden="true">'
        + '<polyline points="' + pts + '" fill="none" stroke="' + col + '" stroke-width="1.6" stroke-linejoin="round"/></svg>';
    }
    function card(q) {
      if (q.error || q.price == null) {
        return '<div class="sx-card"><div class="sx-sym">' + q.symbol + '</div>'
          + '<div class="sx-name">' + (q.name || "") + '</div><div class="sx-price">—</div>'
          + '<div class="sx-meta"><span>unavailable</span></div></div>';
      }
      var up = (q.change || 0) >= 0, dec = (q.currency === "TWD" && q.price < 200) ? 2 : 2;
      return '<div class="sx-card ' + (up ? "up" : "down") + '">'
        + '<div class="sx-sym">' + q.symbol + '</div>'
        + '<div class="sx-name">' + (q.name || "") + '</div>'
        + '<div class="sx-price">' + fmt(q.price, dec) + '<span class="sx-cur">' + (q.currency || "") + '</span></div>'
        + '<div class="sx-chg ' + (up ? "up" : "down") + '">' + (up ? "▲" : "▼") + " "
        + fmt(Math.abs(q.change), 2) + " (" + (up ? "+" : "") + fmt(q.change_pct, 2) + "%)</div>"
        + spark(q.spark, up)
        + '<div class="sx-meta"><span>day ' + fmt(q.day_low, 2) + "–" + fmt(q.day_high, 2) + "</span>"
        + '<span>52w ' + fmt(q.fifty_two_low, 0) + "–" + fmt(q.fifty_two_high, 0) + "</span></div>"
        + "</div>";
    }
    function render(quotes, updated, live) {
      var tw = quotes.filter(function (q) { return q.market === "TW"; });
      var us = quotes.filter(function (q) { return q.market !== "TW"; });
      var html = "";
      if (tw.length) html += '<p class="sx-sec">Taiwan</p><div class="sx-grid">' + tw.map(card).join("") + "</div>";
      if (us.length) html += '<p class="sx-sec">US</p><div class="sx-grid">' + us.map(card).join("") + "</div>";
      root.innerHTML = html;
      document.getElementById("sx-updated").textContent =
        (live ? "Refreshed live in your browser just now." : "Snapshot taken " + (updated || "").replace("T", " ").replace("Z", " UTC") + ".");
      liveEl.className = "sx-live" + (live ? " on" : "");
      liveT.textContent = live ? "live" : "snapshot";
    }

    // 1. Always show the committed snapshot first — it is real and always available.
    fetch(DATA + "?cb=" + Date.now()).then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d || !d.quotes) { root.innerHTML = '<div class="sx-err">No snapshot yet.</div>'; return; }
        render(d.quotes, d.updated_utc, false);
        // 2. Then try a live refresh through a public CORS proxy. Yahoo sends no
        //    CORS header, and the proxy is rate-limited, so this is best-effort:
        //    on failure we simply keep the snapshot rather than showing nothing.
        var live = d.quotes.map(function (q) {
          return fetch(PROXY + encodeURIComponent(API + q.symbol + "?range=1mo&interval=1d"))
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (j) {
              if (!j || !j.chart || !j.chart.result) return q;
              var m = j.chart.result[0].meta;
              var cl = ((j.chart.result[0].indicators || {}).quote || [{}])[0].close || [];
              cl = cl.filter(function (c) { return c != null; }).slice(-30);
              var p = m.regularMarketPrice, pv = m.chartPreviousClose || m.previousClose;
              if (p == null || pv == null) return q;
              return { symbol: q.symbol, name: q.name, market: q.market, price: p, prev_close: pv,
                change: p - pv, change_pct: (p - pv) / pv * 100, currency: m.currency,
                day_high: m.regularMarketDayHigh, day_low: m.regularMarketDayLow,
                fifty_two_high: m.fiftyTwoWeekHigh, fifty_two_low: m.fiftyTwoWeekLow, spark: cl };
            }).catch(function () { return q; });
        });
        Promise.all(live).then(function (rows) {
          var anyLive = rows.some(function (r, i) { return r !== d.quotes[i]; });
          if (anyLive) render(rows, d.updated_utc, true);
        });
      })
      .catch(function () { root.innerHTML = '<div class="sx-err">Couldn\'t load quotes.</div>'; });
  })();
  </script>
</body>
</html>
